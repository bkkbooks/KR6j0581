body:
  text: 吳月支優婆塞支謙譯聞如是一時佛在舍衛國祇樹給孤獨園與大比丘衆千二百五十人菩薩萬人爾時從是佛土過億百千佛國有世界名無量華其佛號鄧尊王如來無所著至真等正覺今現在説法彼佛遣二菩薩一名無量光明二名大光明時二菩薩來至釋迦文佛所稽首佛足却住一面前白佛言唯然世尊從是佛土過億百千佛國有世界名無量華其佛號鄧尊王如來遣我等來世尊如常不其衆安隱無他耶天龍鬼神餓鬼女鬼鳩桓若人非人虎狼毒獸得無嬈亂人民用是故佛遣是持句呪來哀念衆生令安吉善名聞威神得力如是闍梨摩訶闍梨羅尼優佉目佉沙波提摩訶沙波提佛告阿難受是持句呪執持誦説佛世難值持句呪亦為難遇善男子善女人受是持句呪諷誦讀識七世宿命受持者一切浮陀鬼神若人非人不得嬈近毒蛇不敢螫毒藥自然除刀亦不能傷王亦不能害梵亦不瞋之是持句呪七十七億佛所説犯是呪者當獲重罪復有菩薩彌勒等八十人告賢者阿難我亦當説持句呪哀念衆生令安吉善名聞威神得力如是阿知和知吒佉羅羅里彌喜利彌利提盧留彌勒佛告阿難受是持句呪執持誦説佛世難值持句呪諷誦讀識十四世宿命受持者一切浮陀鬼神若人非人不得嬈近毒蛇不敢螫毒藥自然除刀亦不能傷王亦不敢害梵亦不瞋之是持句呪八十四億佛所説謗是呪者當獲重罪佛告阿難我亦當説持句呪哀念衆生令安吉善名聞威神得力如是阿知和知那知鳩那知提梨沙羅波提阿那波提波那提波那迦和尼摩訶迦和尼佛告阿難受是持句呪執持誦説佛世難值持句呪亦為難遇善男子善女人受是持句呪諷誦讀識無數世宿命受持者一切浮陀鬼神若人非人不敢嬈近毒蛇不敢螫毒藥自然除刀亦不敢傷王亦不敢害梵亦不瞋之是持句呪無數億佛所説犯是呪者當獲重罪佛告阿難是持句呪行道中當念之若至縣官若行賊中若蠱道若毒若刀刃中若人非人中當念之是持句呪於枯樹令生葉華實何況為人結縷也當使吉百病消除自然安隱辟除凶害南無佛令呪皆得從願佛説經已皆大歡喜
